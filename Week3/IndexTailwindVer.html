<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자기소개 카드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(10px) scale(0.85); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.45; transform: scale(1.5); }
    }

    .card-animated {
      animation: fadeInUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .card-animated:nth-child(2) {
      animation-delay: 0.1s;
    }
    .avatar-animated {
      animation: popIn 0.5s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .pulse-dot {
      animation: pulse-dot 1.8s ease-in-out infinite;
    }

    @media (max-width: 559px) {
      .profile-card { display: flex !important; flex-direction: row !important; }
      .card-banner  { width: 80px !important; height: auto !important; min-height: 100% !important; flex-shrink: 0; }
      .card-banner .status-badge { display: none !important; }
      .card-banner .avatar-wrap {
        position: absolute !important;
        bottom: auto !important; left: 50% !important;
        top: 50% !important;
        transform: translate(-50%, -50%) !important;
        animation: none !important;
      }
      .card-bio { display: none !important; }
    }
  </style>
</head>

<body class="bg-gray-100 dark:bg-slate-900 min-h-screen p-6 transition-colors duration-300">

  <!-- 다크모드 토글 버튼 구현  -->
  <div class="flex justify-end max-w-2xl mx-auto mb-4">
    <button
      onclick="document.documentElement.classList.toggle('dark');
               this.textContent = document.documentElement.classList.contains('dark') ? '☀️ 라이트 모드' : '🌙 다크 모드'"
      class="text-xs font-medium px-4 py-2 rounded-full border border-gray-300 bg-white
             text-gray-600 hover:bg-gray-50 active:scale-95
             dark:bg-slate-800 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-700
             transition-all duration-200">
      다크 모드
    </button>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 max-w-2xl mx-auto">

    <!-- 카드 1 : 임수종 (파란색) -->
    <div class="profile-card card-animated
                bg-white dark:bg-slate-800
                rounded-2xl overflow-hidden
                shadow-md dark:shadow-slate-900/60
                border border-transparent dark:border-slate-700
                hover:-translate-y-2 hover:shadow-xl dark:hover:shadow-slate-900/80
                transition-all duration-300">

      <div class="card-banner relative h-20 bg-gradient-to-br from-blue-900 to-blue-500">
        <span class="status-badge absolute top-3 right-3
                     text-xs text-white bg-white/20 px-2.5 py-1
                     rounded-full flex items-center gap-1.5">
          <span class="pulse-dot w-2 h-2 bg-green-400 rounded-full inline-block"></span>
          Available
        </span>
        <div class="avatar-wrap absolute -bottom-7 left-4">
          <div class="w-14 h-14 rounded-full border-4 border-white dark:border-slate-800
                      bg-blue-600 flex items-center justify-center
                      text-white font-bold text-xl transition-colors duration-300">
            임
          </div>
        </div>
      </div>

      <div class="pt-11 px-5 pb-5">
        <h2 class="text-lg font-bold text-gray-900 dark:text-slate-100 mb-0.5 transition-colors duration-300">임수종</h2>
        <p class="text-xs text-gray-400 dark:text-slate-500 mb-3 transition-colors duration-300">프론트엔드 · 용인</p>
        <p class="card-bio text-sm text-gray-500 dark:text-slate-400
                  border-l-2 border-gray-200 dark:border-slate-600
                  pl-3 mb-4 leading-relaxed transition-colors duration-300">
          프론트엔드 3주차 과제 제출용 프로필입니다!
        </p>
        <div class="flex flex-wrap gap-1.5 mb-4">
          <span class="text-xs font-medium px-2.5 py-1 rounded-full
                       bg-blue-50 text-blue-800 border border-blue-200
                       dark:bg-blue-900/40 dark:text-blue-300 dark:border-blue-700
                       hover:scale-105 active:scale-95 transition-all duration-200 cursor-default">React</span>
          <span class="text-xs font-medium px-2.5 py-1 rounded-full
                       border border-gray-200 text-gray-500
                       dark:border-slate-600 dark:text-slate-400
                       hover:scale-105 hover:bg-gray-100 dark:hover:bg-slate-700
                       active:scale-95 transition-all duration-200 cursor-default">TypeScript</span>
          <span class="text-xs font-medium px-2.5 py-1 rounded-full
                       border border-gray-200 text-gray-500
                       dark:border-slate-600 dark:text-slate-400
                       hover:scale-105 hover:bg-gray-100 dark:hover:bg-slate-700
                       active:scale-95 transition-all duration-200 cursor-default">Tailwind</span>
        </div>
        <div class="border-t border-gray-100 dark:border-slate-700 mb-4 transition-colors duration-300"></div>
        <div class="grid grid-cols-2 gap-2">
          <button class="bg-blue-900 text-white text-xs rounded-lg py-2
                         hover:bg-blue-700 hover:-translate-y-0.5
                         dark:bg-blue-700 dark:hover:bg-blue-600
                         active:scale-95 transition-all duration-200">GitHub</button>
          <button class="border border-gray-200 text-xs rounded-lg py-2 text-gray-600
                         hover:bg-gray-50 hover:-translate-y-0.5
                         dark:border-slate-600 dark:text-slate-400 dark:hover:bg-slate-700
                         active:scale-95 transition-all duration-200">Blog</button>
        </div>
      </div>
    </div>

    <!--  카드 2 : 쫑수 (빨간색) -->
    <div class="profile-card card-animated
                bg-white dark:bg-slate-800
                rounded-2xl overflow-hidden
                shadow-md dark:shadow-slate-900/60
                border border-transparent dark:border-slate-700
                hover:-translate-y-2 hover:shadow-xl dark:hover:shadow-slate-900/80
                transition-all duration-300">

      <div class="card-banner relative h-20 bg-gradient-to-br from-red-900 to-red-500">
        <span class="status-badge absolute top-3 right-3
                     text-xs text-white bg-white/20 px-2.5 py-1
                     rounded-full flex items-center gap-1.5">
          <span class="pulse-dot w-2 h-2 bg-green-400 rounded-full inline-block"></span>
          Available
        </span>
        <div class="avatar-wrap absolute -bottom-7 left-4">
          <div class="w-14 h-14 rounded-full border-4 border-white dark:border-slate-800
                      bg-red-600 flex items-center justify-center
                      text-white font-bold text-xl transition-colors duration-300">
            쫑
          </div>
        </div>
      </div>

      <div class="pt-11 px-5 pb-5">
        <h2 class="text-lg font-bold text-gray-900 dark:text-slate-100 mb-0.5 transition-colors duration-300">쫑수</h2>
        <p class="text-xs text-gray-400 dark:text-slate-500 mb-3 transition-colors duration-300">백엔드 · 용인</p>
        <p class="card-bio text-sm text-gray-500 dark:text-slate-400
                  border-l-2 border-gray-200 dark:border-slate-600
                  pl-3 mb-4 leading-relaxed transition-colors duration-300">
          백엔드 개발자를 꿈꾸는 임수종입니다!
        </p>
        <div class="flex flex-wrap gap-1.5 mb-4">
          <span class="text-xs font-medium px-2.5 py-1 rounded-full
                       bg-red-50 text-red-800 border border-red-200
                       dark:bg-red-900/40 dark:text-red-300 dark:border-red-700
                       hover:scale-105 active:scale-95 transition-all duration-200 cursor-default">Java</span>
          <span class="text-xs font-medium px-2.5 py-1 rounded-full
                       border border-gray-200 text-gray-500
                       dark:border-slate-600 dark:text-slate-400
                       hover:scale-105 hover:bg-gray-100 dark:hover:bg-slate-700
                       active:scale-95 transition-all duration-200 cursor-default">Python</span>
        </div>
        <div class="border-t border-gray-100 dark:border-slate-700 mb-4 transition-colors duration-300"></div>
        <div class="grid grid-cols-2 gap-2">
          <button class="bg-red-800 text-white text-xs rounded-lg py-2
                         hover:bg-red-600 hover:-translate-y-0.5
                         dark:bg-red-700 dark:hover:bg-red-600
                         active:scale-95 transition-all duration-200">GitHub</button>
          <button class="border border-gray-200 text-xs rounded-lg py-2 text-gray-600
                         hover:bg-gray-50 hover:-translate-y-0.5
                         dark:border-slate-600 dark:text-slate-400 dark:hover:bg-slate-700
                         active:scale-95 transition-all duration-200">Blog</button>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
